name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "import flask; print(f'Flask {flask.__version__}')"
          python -c "import waitress; print('Waitress OK')"
          python -c "from pathlib import Path; print('Pathlib OK')"

      - name: Check for syntax errors
        run: |
          python -m py_compile backend/app.py
          python -m py_compile backend/database.py
          python -m py_compile backend/food_analyzer.py
          python -m py_compile backend/food_database.py
          python -m py_compile backend/server.py

      - name: Verify no hardcoded secrets
        run: |
          python -c "
          import re, sys, pathlib
          issues = []
          for f in pathlib.Path('backend').glob('*.py'):
              text = f.read_text(encoding='utf-8')
              # Check for hardcoded API keys (not template/demo ones)
              for m in re.finditer(r'[\x27\x22](?:sk-|AIza|ghp_|AKIA)[A-Za-z0-9]{20,}[\x27\x22]', text):
                  issues.append(f'{f}:{m.start()}: possible hardcoded key')
          if issues:
              print('SECURITY: Found possible hardcoded secrets:')
              for i in issues: print(f'  {i}')
              sys.exit(1)
          print('No hardcoded secrets found ✓')
          "

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install safety
        run: pip install safety pip-audit

      - name: Check for known vulnerabilities
        run: |
          pip install -r requirements.txt
          pip-audit --strict || true
